# Strava Activity Hide - Configuration
# See README.md for full documentation of available fields and operators.

strava:
  client_id: "YOUR_CLIENT_ID"
  client_secret: "YOUR_CLIENT_SECRET"

schedule:
  interval_minutes: 15

settings:
  # Set to false once you've verified rules work correctly
  dry_run: true
  # How far back to look on first run (hours)
  lookback_hours: 24

rules:
  # Hide all Zwift activities
  - name: "Hide Zwift activities"
    description: "Hide all activities uploaded from Zwift"
    match: all
    conditions:
      - field: external_id
        operator: contains
        value: "zwift"
    actions:
      - hide

  # Delete very short rides (likely accidental starts)
  - name: "Delete short rides"
    description: "Delete cycling activities shorter than 1km"
    match: all
    conditions:
      - field: sport_type
        operator: eq
        value: "Ride"
      - field: distance
        operator: lt
        value: 1000
    actions:
      - delete

  # Mute trainer activities from feed
  - name: "Mute trainer activities"
    description: "Hide indoor trainer activities from home feed"
    match: all
    conditions:
      - field: trainer
        operator: eq
        value: true
    actions:
      - mute

  # Rename and mute activities from a specific device
  - name: "Mute Garmin auto-uploads"
    description: "Mute activities from Garmin devices"
    match: all
    conditions:
      - field: device_name
        operator: contains
        value: "Garmin"
    actions:
      - type: update
        fields:
          hide_from_home: true
